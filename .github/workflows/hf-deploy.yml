name: Sync backend to Hugging Face Space

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/hf-deploy.yml'
  workflow_dispatch:

concurrency:
  group: hf-sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Push backend/ to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USER: ${{ vars.HF_USERNAME }}
          HF_SPACE: ${{ vars.HF_SPACE_NAME }}
        run: |
          set -euo pipefail

          if [ -z "${HF_USER:-}" ] || [ -z "${HF_SPACE:-}" ] || [ -z "${HF_TOKEN:-}" ]; then
            echo "::error::Missing HF_USERNAME / HF_SPACE_NAME (repo variables) or HF_TOKEN (repo secret)"
            exit 1
          fi

          git config --global user.email "github-actions@users.noreply.github.com"
          git config --global user.name  "GitHub Actions"

          git clone "https://user:${HF_TOKEN}@huggingface.co/spaces/${HF_USER}/${HF_SPACE}" hf-space

          find hf-space -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          cp -a backend/. hf-space/

          cd hf-space
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to push."
            exit 0
          fi
          git commit -m "Sync from GitHub @ ${GITHUB_SHA::7}"
          git push origin main
